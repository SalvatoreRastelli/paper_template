name: Build paper

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python dependencies
        run: uv sync

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            cm-super \
            dvipng

      - name: Build paper
        run: make

      - name: Upload PDFs
        uses: actions/upload-artifact@v6
        with:
          name: paper-pdf
          path: |
            paper/aaai/main.pdf
            paper/arxiv/main.pdf
